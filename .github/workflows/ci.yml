name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Tests and build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lightweight Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pillow pydantic pydantic-settings huggingface_hub

      - name: Run Python tests
        run: python -m unittest discover tests -v

      - name: Compile Python sources
        run: python -m compileall backend tests scripts krea_share_control.pyw

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build frontend
        working-directory: frontend
        run: npm run build
